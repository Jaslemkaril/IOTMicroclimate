; ============================================================
;  TerraSync — PlatformIO Configuration
;  Board  : ESP32 Dev Module
;  Target : DHT22 + Soil Moisture → POST to Node.js API
;
;  FLASH : pio run --target upload
;  SERIAL: pio device monitor
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Upload ──────────────────────────────────────────────────
; PlatformIO auto-detects the COM port — just plug in the USB
upload_speed    = 115200
upload_flags =
    --before
    default_reset
    --after
    hard_reset
    --connect-attempts
    5
upload_port   = COM3    

; ── Serial monitor ──────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
monitor_rts     = 0
monitor_dtr     = 0
; monitor_port  = COM3   ; Uncomment & set if auto-detect fails

; ── Libraries ───────────────────────────────────────────────
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    bblanchon/ArduinoJson @ ^7.2.0

; ── Build flags ─────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
